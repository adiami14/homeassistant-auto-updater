name: Bug Report
description: File a bug report to help improve Auto Updater
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please fill in as much detail as possible so we can help you quickly.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure Auto Updater with ...
        2. Wait for scheduled run / call update_now
        3. See error
    validations:
      required: true

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: "2026.3.4"
    validations:
      required: true

  - type: input
    id: integration-version
    attributes:
      label: Auto Updater version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: installation
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual
    validations:
      required: true

  - type: textarea
    id: configuration
    attributes:
      label: Configuration
      description: >
        Your Auto Updater settings (update time, days, types, etc.).
        Do NOT include passwords or tokens.
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: >
        Go to Settings → System → Logs and filter by `auto_updater`.
        Paste the relevant lines here.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues before opening this one
          required: true
        - label: I have included HA version and integration version
          required: true
